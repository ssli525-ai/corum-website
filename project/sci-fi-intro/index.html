<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corum 杜其骏 - 个人档案</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0f;
  font-family:'Courier New',monospace;
  color:#e0e0e0;
  min-height:100vh;
  overflow-x:hidden;
}
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.grid-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:linear-gradient(rgba(0,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,0.03) 1px,transparent 1px);
  background-size:50px 50px;z-index:0;pointer-events:none;
}
.scanlines{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,255,0.015) 2px,rgba(0,255,255,0.015) 4px);
  z-index:1;pointer-events:none;
}
.main-container{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
.holo-card{
  position:relative;width:100%;max-width:650px;
  background:rgba(10,10,30,0.85);
  border:1px solid rgba(0,255,255,0.3);
  border-radius:4px;padding:50px 40px;
  box-shadow:0 0 20px rgba(0,255,255,0.1),0 0 60px rgba(0,255,255,0.05),inset 0 0 60px rgba(0,255,255,0.02);
  backdrop-filter:blur(10px);
  clip-path:polygon(0% 3%,3% 0%,97% 0%,100% 3%,100% 97%,97% 100%,3% 100%,0% 97%);
}
.holo-card::before{
  content:'';position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;
  background:linear-gradient(45deg,#00ffff,#ff00ff,#00ffff,#ff00ff);
  border-radius:5px;z-index:-1;
  animation:borderGlow 4s linear infinite;
  filter:blur(8px);opacity:0.5;
}
.holo-card::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(10,10,30,0.9);border-radius:3px;z-index:-1;
}
@keyframes borderGlow{
  0%{filter:blur(8px) hue-rotate(0deg)}
  50%{filter:blur(12px) hue-rotate(180deg)}
  100%{filter:blur(8px) hue-rotate(360deg)}
}
.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:30px;padding-bottom:15px;
  border-bottom:1px solid rgba(0,255,255,0.2);
  font-size:12px;letter-spacing:2px;
}
.status-dot{
  display:inline-block;width:8px;height:8px;
  background:#00ff88;border-radius:50%;
  box-shadow:0 0 8px #00ff88;
  animation:pulse 2s ease-in-out infinite;
  margin-right:8px;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.4;transform:scale(1.3)}
}
.status-text{color:#00ff88;font-size:12px}
.id-tag{color:rgba(0,255,255,0.6);font-size:11px}
.header-section{text-align:center;margin-bottom:35px}
.name-cn{
  font-size:48px;font-weight:bold;
  background:linear-gradient(135deg,#00ffff,#ff00ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:8px;margin-bottom:5px;
  filter:drop-shadow(0 0 20px rgba(0,255,255,0.5));
}
.name-en{font-size:22px;color:rgba(0,255,255,0.7);letter-spacing:12px;margin-bottom:8px;text-transform:uppercase}
.title-sub{font-size:14px;color:rgba(255,0,255,0.6);letter-spacing:4px}
.divider{display:flex;align-items:center;justify-content:center;margin:25px 0;gap:15px}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,255,0.3),transparent)}
.divider-icon{color:#00ffff;font-size:14px;animation:spin 6s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.info-item{
  position:relative;background:rgba(0,255,255,0.03);
  border:1px solid rgba(0,255,255,0.15);
  padding:18px 20px;border-radius:2px;
  transition:all 0.3s ease;overflow:hidden;
}
.info-item:hover{
  border-color:rgba(0,255,255,0.5);
  box-shadow:0 0 15px rgba(0,255,255,0.1),inset 0 0 15px rgba(0,255,255,0.05);
  transform:translateY(-2px);
}
.info-item::before{
  content:'';position:absolute;top:0;left:0;
  width:3px;height:100%;background:#00ffff;
  box-shadow:0 0 8px #00ffff;
}
.info-label{font-size:10px;color:rgba(0,255,255,0.5);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.info-value{font-size:20px;color:#e0e0e0;letter-spacing:2px}
.info-value.highlight{color:#00ffff;text-shadow:0 0 10px rgba(0,255,255,0.4)}
.hobby-section{
  grid-column:1/-1;text-align:center;padding:25px 20px;
  background:rgba(0,255,255,0.02);
  border:1px solid rgba(0,255,255,0.2);
  border-radius:2px;position:relative;overflow:hidden;
}
.hobby-section::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at center,rgba(0,255,255,0.05) 0%,transparent 70%);
}
.hobby-icon{font-size:40px;animation:bounce 1.5s ease-in-out infinite;display:inline-block;position:relative;z-index:1}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  30%{transform:translateY(-10px)}
  50%{transform:translateY(0)}
  70%{transform:translateY(-5px)}
}
.hobby-label{font-size:11px;color:rgba(0,255,255,0.5);letter-spacing:4px;margin-bottom:10px;position:relative;z-index:1}
.hobby-value{font-size:28px;color:#00ffff;letter-spacing:6px;text-shadow:0 0 20px rgba(0,255,255,0.5);position:relative;z-index:1}
.data-stream{margin-top:30px;padding-top:15px;border-top:1px solid rgba(0,255,255,0.15);text-align:center;font-size:11px;color:rgba(0,255,255,0.3);letter-spacing:1px}
.data-stream span{display:inline-block;animation:dataFlow 3s linear infinite;opacity:0}
@keyframes dataFlow{
  0%{opacity:0;transform:translateY(0)}
  10%{opacity:1}
  90%{opacity:0}
  100%{opacity:0;transform:translateY(-5px)}
}
.corner-decor{position:fixed;z-index:3;pointer-events:none}
.corner-decor.top-left{top:30px;left:30px;width:60px;height:60px;border-top:1px solid rgba(0,255,255,0.3);border-left:1px solid rgba(0,255,255,0.3)}
.corner-decor.top-right{top:30px;right:30px;width:60px;height:60px;border-top:1px solid rgba(0,255,255,0.3);border-right:1px solid rgba(0,255,255,0.3)}
.corner-decor.bottom-left{bottom:30px;left:30px;width:60px;height:60px;border-bottom:1px solid rgba(0,255,255,0.3);border-left:1px solid rgba(0,255,255,0.3)}
.corner-decor.bottom-right{bottom:30px;right:30px;width:60px;height:60px;border-bottom:1px solid rgba(0,255,255,0.3);border-right:1px solid rgba(0,255,255,0.3)}
.ring-decor{position:fixed;z-index:3;pointer-events:none}
.ring-decor.ring-1{top:50px;right:120px;width:80px;height:80px;border:1px solid rgba(255,0,255,0.15);border-radius:50%;animation:ringRotate 10s linear infinite}
.ring-decor.ring-2{bottom:80px;left:100px;width:60px;height:60px;border:1px solid rgba(0,255,255,0.12);border-radius:50%;animation:ringRotate 8s linear infinite reverse}
@keyframes ringRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(max-width:600px){
  .info-grid{grid-template-columns:1fr}
  .holo-card{padding:30px 20px}
  .name-cn{font-size:32px;letter-spacing:4px}
  .info-value{font-size:18px}
  .corner-decor,.ring-decor{display:none}
}
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="grid-bg"></div>
<div class="scanlines"></div>
<div class="corner-decor top-left"></div>
<div class="corner-decor top-right"></div>
<div class="corner-decor bottom-left"></div>
<div class="corner-decor bottom-right"></div>
<div class="ring-decor ring-1"></div>
<div class="ring-decor ring-2"></div>
<div class="main-container">
  <div class="holo-card">
    <div class="status-bar">
      <div>
        <span class="status-dot"></span>
        <span class="status-text">SYSTEM ONLINE</span>
      </div>
      <div class="id-tag">// SUBJECT_NO.0011</div>
    </div>
    <div class="header-section">
      <div class="name-cn">杜 其 骏</div>
      <div class="name-en">C O R U M</div>
      <div class="title-sub">⋆ 个 人 档 案 系 统 ⋆</div>
    </div>
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-icon">⟐</span>
      <span class="divider-line"></span>
    </div>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">// 年龄</div>
        <div class="info-value highlight">11 <span style="font-size:14px">岁</span></div>
      </div>
      <div class="info-item">
        <div class="info-label">// 身高</div>
        <div class="info-value">151 <span style="font-size:14px">cm</span></div>
      </div>
      <div class="info-item">
        <div class="info-label">// 体重</div>
        <div class="info-value">72 <span style="font-size:14px">斤</span></div>
      </div>
      <div class="info-item">
        <div class="info-label">// 代号</div>
        <div class="info-value highlight">CORUM</div>
      </div>
      <div class="hobby-section">
        <div class="hobby-label">// 兴趣爱好</div>
        <div class="hobby-icon">⚽</div>
        <div class="hobby-value">足 球</div>
      </div>
    </div>
    <div class="data-stream">
      <span>[ 01000110 01110101 01110100 01110101 01110010 01100101 ]</span>
    </div>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('starfield');
  const ctx=canvas.getContext('2d');
  let stars=[],meteors=[];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  window.addEventListener('resize',resize);resize();
  for(let i=0;i<200;i++){
    stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.5,alpha:Math.random(),speed:Math.random()*0.008+0.003});
  }
  function spawnMeteor(){
    meteors.push({x:Math.random()*canvas.width*0.8,y:-10,len:Math.random()*80+40,speed:Math.random()*6+4,alpha:1,angle:Math.random()*0.3+0.1});
  }
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      s.alpha+=s.speed;
      if(s.alpha>1||s.alpha<0.1)s.speed=-s.speed;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(0,255,255,'+(s.alpha*0.6)+')';ctx.fill();
      ctx.beginPath();ctx.arc(s.x,s.y,s.r*3,0,Math.PI*2);
      ctx.fillStyle='rgba(0,255,255,'+(s.alpha*0.08)+')';ctx.fill();
    });
    meteors.forEach((m,i)=>{
      m.x+=m.speed*Math.cos(m.angle);m.y+=m.speed*Math.sin(m.angle);m.alpha-=0.015;
      if(m.alpha<=0){meteors.splice(i,1);return}
      const g=ctx.createLinearGradient(m.x,m.y,m.x-m.len*Math.cos(m.angle),m.y-m.len*Math.sin(m.angle));
      g.addColorStop(0,'rgba(255,255,255,'+m.alpha+')');g.addColorStop(1,'rgba(0,255,255,0)');
      ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(m.x-m.len*Math.cos(m.angle),m.y-m.len*Math.sin(m.angle));
      ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();
    });
    if(Math.random()<0.02&&meteors.length<3)spawnMeteor();
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
</body>
</html>
